<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Erreur · Balance Ton Rappeur</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { theme: { extend: { fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] } } } }</script>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
</head>
<body class="bg-zinc-950 text-zinc-100 min-h-screen flex flex-col antialiased">

<header th:replace="~{layout :: nav}"></header>

<main class="flex-1 flex items-center justify-center">
    <div class="max-w-md mx-auto px-4 py-24 text-center">

        <!-- Code erreur -->
        <p class="text-7xl font-extrabold text-zinc-800 mb-4" th:text="${status ?: '?'}">500</p>

        <!-- Message selon le code -->
        <h1 class="text-xl font-bold text-white mb-3">
            <span th:if="${status == 404}">Page introuvable</span>
            <span th:if="${status == 403}">Accès refusé</span>
            <span th:if="${status == 500}">Erreur serveur</span>
            <span th:unless="${status == 404 or status == 403 or status == 500}">Une erreur est survenue</span>
        </h1>

        <p class="text-zinc-500 text-sm mb-10">
            <span th:if="${status == 404}">Cette page n'existe pas ou a été déplacée.</span>
            <span th:if="${status == 403}">Vous n'avez pas accès à cette ressource.</span>
            <span th:if="${status == 500}">Quelque chose s'est mal passé côté serveur.</span>
            <span th:unless="${status == 404 or status == 403 or status == 500}">
                Une erreur inattendue s'est produite.
            </span>
        </p>

        <div class="flex items-center justify-center gap-3">
            <a href="/"
               class="bg-white text-zinc-950 font-semibold text-sm px-5 py-2.5 rounded-lg
                      hover:bg-zinc-200 transition-colors">
                ← Retour à l'accueil
            </a>
            <a href="/rappers"
               class="text-zinc-500 text-sm px-5 py-2.5 rounded-lg border border-zinc-800
                      hover:text-white hover:border-zinc-600 transition-colors">
                Voir les rappeurs
            </a>
        </div>

    </div>
</main>

<footer th:replace="~{layout :: footer}"></footer>

</body>
</html>
