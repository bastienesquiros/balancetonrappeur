<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head th:fragment="head(pageTitle, pageDescription, canonicalUrl, ogType, ogImage)">
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title th:text="${pageTitle != null ? pageTitle + ' · Balance Ton Rappeur' : 'Balance Ton Rappeur'}">Balance Ton Rappeur</title>
    <meta name="description" th:content="${pageDescription != null ? pageDescription : 'Affaires, accusations et condamnations du monde du rap, documentées et sourcées.'}"/>

    <link rel="canonical" th:href="${canonicalUrl != null ? canonicalUrl : 'https://balancetonrappeur.fr'}"/>

    <meta property="og:type"        th:content="${ogType != null ? ogType : 'website'}"/>
    <meta property="og:site_name"   content="Balance Ton Rappeur"/>
    <meta property="og:title"       th:content="${pageTitle != null ? pageTitle + ' · Balance Ton Rappeur' : 'Balance Ton Rappeur'}"/>
    <meta property="og:description" th:content="${pageDescription != null ? pageDescription : 'Affaires, accusations et condamnations du monde du rap, documentées et sourcées.'}"/>
    <meta property="og:url"         th:content="${canonicalUrl != null ? canonicalUrl : 'https://balancetonrappeur.fr'}"/>
    <meta property="og:image"       th:content="${ogImage != null ? ogImage : 'https://balancetonrappeur.fr/og-default.png'}"/>

    <meta name="twitter:card"        content="summary"/>
    <meta name="twitter:title"       th:content="${pageTitle != null ? pageTitle + ' · Balance Ton Rappeur' : 'Balance Ton Rappeur'}"/>
    <meta name="twitter:description" th:content="${pageDescription != null ? pageDescription : 'Affaires, accusations et condamnations du monde du rap, documentées et sourcées.'}"/>
    <meta name="twitter:image"       th:content="${ogImage != null ? ogImage : 'https://balancetonrappeur.fr/og-default.png'}"/>

    <link rel="icon" type="image/x-icon" href="/favicon.ico"/>

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: { extend: { fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] } } }
        }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>
<body class="bg-zinc-950 text-zinc-100 min-h-screen flex flex-col antialiased">

    <!-- NAV -->
    <header th:fragment="nav" class="border-b border-zinc-800/60 sticky top-0 z-50 bg-zinc-950/95 backdrop-blur-md">
        <nav class="max-w-5xl mx-auto px-4 h-14 flex items-center justify-between gap-6">
            <a href="/" class="font-bold text-sm tracking-tight text-white hover:text-zinc-300 transition-colors flex-shrink-0 flex items-center gap-2">
                <span class="text-base">🎤</span>
                <span class="hidden sm:inline">Balance Ton Rappeur</span>
                <span class="sm:hidden">BTR</span>
            </a>
            <div class="flex items-center gap-1 text-sm text-zinc-500 flex-1 justify-center">
                <a href="/rappers"     class="px-3 py-1.5 rounded-lg hover:bg-zinc-800 hover:text-white transition-colors">Rappeurs</a>
                <a href="/accusations" class="px-3 py-1.5 rounded-lg hover:bg-zinc-800 hover:text-white transition-colors">Affaires</a>
                <a href="/timeline"    class="px-3 py-1.5 rounded-lg hover:bg-zinc-800 hover:text-white transition-colors hidden sm:block">Timeline</a>
                <a href="/stats"       class="px-3 py-1.5 rounded-lg hover:bg-zinc-800 hover:text-white transition-colors hidden sm:block">Stats</a>
            </div>
            <div class="flex items-center gap-2 flex-shrink-0">
                <a href="/scan"
                   class="hidden sm:flex items-center gap-1.5 text-xs font-medium text-zinc-400 hover:text-white px-3 py-1.5 rounded-lg transition-colors border border-zinc-800 hover:border-zinc-600">
                    <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M9 19V6l12-3v13M9 19c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zm12-3c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zM9 10l12-3"/>
                    </svg>
                    Scanner
                </a>
                <a href="/rappers/suggest"
                   class="text-xs font-medium bg-zinc-800 hover:bg-zinc-700 text-zinc-300 hover:text-white px-3 py-1.5 rounded-lg transition-colors border border-zinc-700/60">
                    + Contribuer
                </a>
            </div>
        </nav>
    </header>

    <!-- MAIN CONTENT -->
    <main class="flex-1" th:fragment="content">
        <!-- remplacé par chaque page -->
    </main>

    <!-- FOOTER -->
    <footer th:fragment="footer" class="border-t border-zinc-800 mt-20">
        <div class="max-w-5xl mx-auto px-4 py-8 text-zinc-500 text-xs flex flex-col sm:flex-row justify-between gap-4">
            <p>© 2026 Balance Ton Rappeur · Informations issues de sources publiques uniquement.</p>
            <div class="flex gap-4">
                <a href="/legal" class="hover:text-zinc-300 transition-colors">Mentions légales</a>
                <a href="/legal#retrait" class="hover:text-zinc-300 transition-colors">Demande de retrait</a>
            </div>
        </div>
    </footer>

</body>
</html>
