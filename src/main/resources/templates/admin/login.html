<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Admin · BTR</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-zinc-950 text-zinc-100 min-h-screen flex items-center justify-center">
<div class="w-full max-w-sm">
    <div class="text-center mb-8">
        <p class="text-3xl mb-2">🎤</p>
        <h1 class="text-xl font-bold text-white">BTR Admin</h1>
        <p class="text-zinc-500 text-sm mt-1">Accès restreint</p>
    </div>

    <div th:if="${error}"
         class="bg-red-950 border border-red-900 rounded-xl px-4 py-3 text-red-400 text-sm mb-4">
        <span th:text="${error}"></span>
    </div>

    <form action="/admin/login" method="post"
          class="bg-zinc-900 border border-zinc-800 rounded-2xl p-6 space-y-4">
        <div>
            <label class="block text-zinc-400 text-xs font-medium mb-2 uppercase tracking-wide">
                Mot de passe
            </label>
            <input type="password" name="password" autofocus
                   class="w-full bg-zinc-800 border border-zinc-700 rounded-lg px-4 py-2.5
                          text-white placeholder-zinc-500 text-sm focus:outline-none focus:border-zinc-500"/>
        </div>
        <button type="submit"
                class="w-full bg-white text-zinc-900 font-semibold py-2.5 rounded-lg text-sm
                       hover:bg-zinc-200 transition-colors">
            Connexion
        </button>
    </form>
</div>
</body>
</html>
