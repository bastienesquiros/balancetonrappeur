<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout :: head('Affaires', null, null, null, null)}"></head>
<body class="bg-zinc-950 text-zinc-100 min-h-screen flex flex-col antialiased">

<header th:replace="~{layout :: nav}"></header>

<main class="flex-1">
    <div class="max-w-5xl mx-auto px-4 py-10">

        <!-- Header -->
        <div class="flex items-baseline justify-between mb-8">
            <div>
                <h1 class="text-2xl font-bold text-white">Affaires</h1>
                <p class="text-zinc-600 text-sm mt-1"
                   th:text="${totalElements != null ? totalElements + ' affaires documentées' : #lists.size(accusations) + ' affaires documentées'}">0 affaires</p>
            </div>
        </div>

        <!-- Filtres -->
        <div class="mb-8">

            <!-- Catégories -->
            <div class="mb-3">
                <p class="text-zinc-600 text-xs uppercase tracking-wider mb-2">Catégorie</p>
                <div class="flex flex-wrap gap-2">
                    <th:block th:each="cat : ${categories}">
                        <a th:href="@{/accusations(category=${cat.name()})}"
                           th:text="${cat.label()}"
                           th:class="${selectedCategories.contains(cat)} ? 'text-xs px-3 py-1.5 rounded-lg border bg-zinc-700 text-white border-zinc-500 transition-colors' : 'text-xs px-3 py-1.5 rounded-lg border text-zinc-500 border-zinc-800 hover:text-white hover:bg-zinc-800/50 transition-colors'">
                        </a>
                    </th:block>
                </div>
            </div>

            <!-- Statuts -->
            <div class="mb-3">
                <p class="text-zinc-600 text-xs uppercase tracking-wider mb-2">Statut</p>
                <div class="flex flex-wrap gap-2">
                    <th:block th:each="st : ${statuses}">
                        <a th:href="@{/accusations(status=${st.name()})}"
                           th:text="${st.label()}"
                           th:class="${selectedStatuses.contains(st)} ? 'text-xs px-3 py-1.5 rounded-lg border bg-zinc-700 text-white border-zinc-500 transition-colors' : 'text-xs px-3 py-1.5 rounded-lg border text-zinc-500 border-zinc-800 hover:text-white hover:bg-zinc-800/50 transition-colors'">
                        </a>
                    </th:block>
                    <a href="/accusations?noStatus=true"
                       th:class="${noStatus} ? 'text-xs px-3 py-1.5 rounded-lg border bg-zinc-700 text-white border-zinc-500 transition-colors' : 'text-xs px-3 py-1.5 rounded-lg border text-zinc-500 border-zinc-800 hover:text-white hover:bg-zinc-800/50 transition-colors'">
                        Sans procédure
                    </a>
                </div>
            </div>

            <!-- Reset conditionnel -->
            <div th:if="${not #lists.isEmpty(selectedCategories) or not #lists.isEmpty(selectedStatuses) or noStatus}" class="mt-1">
                <a href="/accusations" class="text-xs text-zinc-600 hover:text-zinc-400 transition-colors underline underline-offset-2">
                    Réinitialiser les filtres
                </a>
            </div>

        </div>


        <!-- Liste -->
        <div th:if="${not #lists.isEmpty(accusations)}" class="space-y-2">
            <a th:each="accusation : ${accusations}"
               th:href="@{/accusations/{id}(id=${accusation.id})}"
               class="flex items-center gap-4 bg-zinc-900/60 border border-zinc-800/80 rounded-xl px-4 py-3.5
                      hover:border-zinc-700 hover:bg-zinc-900 transition-all group">

                <!-- Dot catégorie -->
                <div class="flex-shrink-0">
                    <span th:class="${accusation.category.color() == 'red'} ? 'block w-2 h-2 rounded-full bg-red-500' :
                                    (${accusation.category.color() == 'orange'} ? 'block w-2 h-2 rounded-full bg-orange-500' :
                                    (${accusation.category.color() == 'purple'} ? 'block w-2 h-2 rounded-full bg-purple-500' :
                                    'block w-2 h-2 rounded-full bg-yellow-500/70'))"></span>
                </div>

                <!-- Contenu principal -->
                <div class="flex-1 min-w-0 flex items-center gap-3">
                    <!-- Avatar rappeur -->
                    <th:block th:replace="~{fragments :: rapperAvatar(${accusation.rapper}, 'w-7 h-7')}"/>
                    <!-- Rappeur + titre -->
                    <div class="min-w-0">
                        <div class="flex items-center gap-2 mb-0.5">
                            <span class="text-zinc-500 text-xs font-medium flex-shrink-0" th:text="${accusation.rapper.name}">Rappeur</span>
                            <span th:if="${accusation.factDate}" class="text-zinc-700 text-xs flex-shrink-0"
                                  th:text="${#temporals.format(accusation.factDate, 'yyyy')}">2020</span>
                        </div>
                        <p class="text-white text-sm font-medium leading-snug truncate group-hover:text-zinc-200 transition-colors"
                           th:text="${accusation.title}">Titre</p>
                    </div>
                </div>

                <!-- Badges -->
                <div class="hidden sm:flex items-center gap-2 flex-shrink-0 ml-auto">
                    <th:block th:replace="~{fragments :: categoryBadge(${accusation.category}, false)}"/>
                    <th:block th:replace="~{fragments :: statusBadge(${accusation.status}, false)}"/>
                </div>

                <!-- Chevron -->
                <svg class="w-4 h-4 text-zinc-700 group-hover:text-zinc-500 flex-shrink-0 transition-colors"
                     fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/>
                </svg>
            </a>
        </div>

        <!-- Vide -->
        <div th:if="${#lists.isEmpty(accusations)}" class="text-center py-20">
            <svg class="w-10 h-10 text-zinc-700 mx-auto mb-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
                <path stroke-linecap="round" stroke-linejoin="round" d="M9 12h3.75M9 15h3.75M9 18h3.75m3 .75H18a2.25 2.25 0 002.25-2.25V6.108c0-1.135-.845-2.098-1.976-2.192a48.424 48.424 0 00-1.123-.08m-5.801 0c-.065.21-.1.433-.1.664 0 .414.336.75.75.75h4.5a.75.75 0 00.75-.75 2.25 2.25 0 00-.1-.664m-5.8 0A2.251 2.251 0 0113.5 2.25H15c1.012 0 1.867.668 2.15 1.586m-5.8 0c-.376.023-.75.05-1.124.08C9.095 4.01 8.25 4.973 8.25 6.108V8.25m0 0H4.875c-.621 0-1.125.504-1.125 1.125v11.25c0 .621.504 1.125 1.125 1.125h9.75c.621 0 1.125-.504 1.125-1.125V9.375c0-.621-.504-1.125-1.125-1.125H8.25zM6.75 12h.008v.008H6.75V12zm0 3h.008v.008H6.75V15zm0 3h.008v.008H6.75V18z"/>
            </svg>
            <p class="text-zinc-500 text-sm">Aucune affaire trouvée pour ce filtre.</p>
        </div>

        <!-- Pagination -->
        <div th:replace="~{fragments :: pagination('/accusations', ${currentPage}, ${totalPages}, ${filterParams})}"></div>

    </div>
</main>

<footer th:replace="~{layout :: footer}"></footer>

</body>
</html>
