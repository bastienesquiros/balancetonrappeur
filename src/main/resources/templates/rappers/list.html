<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title th:text="${query != null ? '&quot;' + query + '&quot; · Balance Ton Rappeur' : 'Rappeurs · Balance Ton Rappeur'}">Rappeurs</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { theme: { extend: { fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] } } } }</script>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
</head>
<body class="bg-zinc-950 text-zinc-100 min-h-screen flex flex-col antialiased">

<header th:replace="~{layout :: nav}"></header>

<main class="flex-1">
    <div class="max-w-5xl mx-auto px-4 py-10">

        <!-- Header -->
        <div class="mb-8">
            <div th:if="${query != null}">
                <p class="text-zinc-600 text-xs mb-1 uppercase tracking-wider">Résultats de recherche</p>
                <h1 class="text-2xl font-bold text-white" th:text="'&quot;' + ${query} + '&quot;'">query</h1>
                <p class="text-zinc-600 text-sm mt-1" th:text="${#lists.size(rappers)} + ' rappeur(s) trouvé(s)'">0 rappeur(s)</p>
            </div>
            <div th:unless="${query != null}">
                <h1 class="text-2xl font-bold text-white">Rappeurs</h1>
                <p class="text-zinc-600 text-sm mt-1" th:text="${totalElements != null ? totalElements + ' rappeurs indexés' : #lists.size(rappers) + ' rappeurs indexés'}">0 rappeurs</p>
            </div>
        </div>

        <!-- Filtres -->
        <div th:unless="${query != null}" class="flex flex-wrap gap-2 mb-8">
            <a href="/rappers"
               th:class="${selectedStatus == null} ? 'text-xs px-3 py-1.5 rounded-lg bg-zinc-800 text-white border border-zinc-700 transition-colors' : 'text-xs px-3 py-1.5 rounded-lg text-zinc-500 hover:text-white hover:bg-zinc-800/50 border border-zinc-800 transition-colors'">
                Tous
            </a>
            <a th:each="s : ${statuses}"
               th:href="@{/rappers(status=${s.name()})}"
               th:text="${s.name() == 'CONVICTED' ? '⛔ Condamnés' : s.name() == 'ACCUSED' ? '🚨 Accusés' : '⚠️ Polémiques'}"
               th:class="${selectedStatus != null and selectedStatus.name() == s.name()} ? 'text-xs px-3 py-1.5 rounded-lg bg-zinc-800 text-white border border-zinc-700 transition-colors' : 'text-xs px-3 py-1.5 rounded-lg text-zinc-500 hover:text-white hover:bg-zinc-800/50 border border-zinc-800 transition-colors'">
            </a>
        </div>

        <!-- Grille -->
        <div th:if="${not #lists.isEmpty(rappers)}"
             class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-3">
            <a th:each="rapper : ${rappers}"
               th:href="@{/rappers/{id}(id=${rapper.id})}"
               class="group bg-zinc-900 border border-zinc-800 rounded-xl p-4 hover:border-zinc-700 hover:bg-zinc-800/50 transition-all flex flex-col">
                <!-- Avatar -->
                <div class="w-10 h-10 rounded-xl mb-3 flex-shrink-0 overflow-hidden bg-zinc-800 group-hover:bg-zinc-700 transition-colors">
                    <img th:if="${rapper.spotifyImageUrl != null}"
                         th:src="${rapper.spotifyImageUrl}" th:alt="${rapper.name}"
                         class="w-full h-full object-cover"/>
                    <span th:if="${rapper.spotifyImageUrl == null}"
                          class="w-full h-full flex items-center justify-center text-lg">🎤</span>
                </div>
                <!-- Nom -->
                <p class="font-semibold text-white text-sm truncate mb-auto" th:text="${rapper.name}">Artiste</p>
                <!-- Badge -->
                <div class="mt-2">
                    <span th:switch="${rapper.status.name()}">
                        <span th:case="'CONVICTED'" class="text-xs px-2 py-0.5 rounded-full bg-red-950/80 text-red-400 border border-red-900/40">⛔ Condamné</span>
                        <span th:case="'ACCUSED'" class="text-xs px-2 py-0.5 rounded-full bg-amber-950/80 text-amber-400 border border-amber-900/40">🚨 Accusé</span>
                        <span th:case="*" class="text-xs px-2 py-0.5 rounded-full bg-zinc-800/80 text-zinc-500 border border-zinc-700/40">⚠️ Polémique</span>
                    </span>
                </div>
            </a>
        </div>

        <!-- Vide -->
        <div th:if="${#lists.isEmpty(rappers)}" class="text-center py-20">
            <p class="text-3xl mb-4">🤷</p>
            <p class="text-zinc-500 text-sm mb-4">Aucun rappeur trouvé.</p>
            <a th:if="${query != null}"
               th:href="@{/rappers/suggest(name=${query})}"
               class="text-sm text-zinc-600 hover:text-white transition-colors underline underline-offset-2">
                Soumettre une affaire pour "<span th:text="${query}"></span>"
            </a>
        </div>

        <!-- Pagination -->
        <nav th:if="${totalPages != null and totalPages > 1}"
             class="flex items-center justify-center gap-1 mt-10">
            <a th:if="${currentPage > 0}"
               th:href="@{/rappers(page=${currentPage - 1})}"
               class="px-3 py-2 rounded-lg text-zinc-400 text-sm hover:bg-zinc-800 hover:text-white transition-colors">← Préc.</a>
            <span th:unless="${currentPage > 0}"
                  class="px-3 py-2 rounded-lg text-zinc-700 text-sm cursor-not-allowed">← Préc.</span>
            <th:block th:each="i : ${#numbers.sequence(0, totalPages - 1)}">
                <th:block th:if="${i == 0 or i == totalPages - 1 or (i >= currentPage - 2 and i <= currentPage + 2)}">
                    <a th:if="${i != currentPage}" th:href="@{/rappers(page=${i})}" th:text="${i + 1}"
                       class="px-3 py-2 rounded-lg text-zinc-400 text-sm hover:bg-zinc-800 hover:text-white transition-colors"></a>
                    <span th:if="${i == currentPage}" th:text="${i + 1}"
                          class="px-3 py-2 rounded-lg bg-white text-zinc-950 text-sm font-semibold"></span>
                </th:block>
                <span th:if="${(i == 1 and currentPage > 3) or (i == totalPages - 2 and currentPage < totalPages - 4)}"
                      class="px-1 text-zinc-700 text-sm">…</span>
            </th:block>
            <a th:if="${currentPage < totalPages - 1}"
               th:href="@{/rappers(page=${currentPage + 1})}"
               class="px-3 py-2 rounded-lg text-zinc-400 text-sm hover:bg-zinc-800 hover:text-white transition-colors">Suiv. →</a>
            <span th:unless="${currentPage < totalPages - 1}"
                  class="px-3 py-2 rounded-lg text-zinc-700 text-sm cursor-not-allowed">Suiv. →</span>
        </nav>

    </div>
</main>

<footer th:replace="~{layout :: footer}"></footer>

</body>
</html>
