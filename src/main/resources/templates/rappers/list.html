<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout :: head('Rappeurs', null, null, null, null)}"></head>
<body class="bg-zinc-950 text-zinc-100 min-h-screen flex flex-col antialiased">

<header th:replace="~{layout :: nav}"></header>

<main class="flex-1">
    <div class="max-w-5xl mx-auto px-4 py-10">

        <!-- Header -->
        <div class="mb-8">
            <div th:if="${query != null}">
                <p class="text-zinc-600 text-xs mb-1 uppercase tracking-wider">Résultats de recherche</p>
                <h1 class="text-2xl font-bold text-white" th:text="'&quot;' + ${query} + '&quot;'">query</h1>
                <p class="text-zinc-600 text-sm mt-1" th:text="${#lists.size(rappers)} + ' rappeur(s) trouvé(s)'">0 rappeur(s)</p>
            </div>
            <div th:unless="${query != null}">
                <h1 class="text-2xl font-bold text-white">Rappeurs</h1>
                <p class="text-zinc-600 text-sm mt-1" th:text="${totalElements != null ? totalElements + ' rappeurs indexés' : #lists.size(rappers) + ' rappeurs indexés'}">0 rappeurs</p>
            </div>
        </div>

        <!-- Filtres -->
        <div th:unless="${query != null}" class="mb-8">
            <p class="text-zinc-600 text-xs uppercase tracking-wider mb-2">Statut</p>
            <div class="flex flex-wrap gap-2">
                <a href="/rappers"
                   th:class="${selectedStatus == null} ? 'text-xs px-3 py-1.5 rounded-lg border bg-zinc-700 text-white border-zinc-500 transition-colors' : 'text-xs px-3 py-1.5 rounded-lg border text-zinc-500 border-zinc-800 hover:text-white hover:bg-zinc-800/50 transition-colors'">
                    Tous
                </a>
                <a th:each="s : ${statuses}"
                   th:href="@{/rappers(status=${s.name()})}"
                   th:text="${s.label()}"
                   th:class="${selectedStatus != null and selectedStatus.name() == s.name()} ? 'text-xs px-3 py-1.5 rounded-lg border bg-zinc-700 text-white border-zinc-500 transition-colors' : 'text-xs px-3 py-1.5 rounded-lg border text-zinc-500 border-zinc-800 hover:text-white hover:bg-zinc-800/50 transition-colors'">
                </a>
            </div>
        </div>

        <!-- Grille -->
        <div th:if="${not #lists.isEmpty(rappers)}"
             class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-3">
            <a th:each="rapper : ${rappers}"
               th:href="@{/rappers/{id}(id=${rapper.id})}"
               class="group bg-zinc-900 border border-zinc-800 rounded-xl p-4 hover:border-zinc-700 hover:bg-zinc-800/50 transition-all flex flex-col">
                <!-- Avatar -->
                <div class="mb-3">
                    <th:block th:replace="~{fragments :: rapperAvatar(${rapper}, 'w-10 h-10')}"/>
                </div>
                <!-- Nom -->
                <p class="font-semibold text-white text-sm truncate mb-auto" th:text="${rapper.name}">Artiste</p>
                <!-- Badge -->
                <div class="mt-2">
                    <th:block th:replace="~{fragments :: rapperStatusBadge(${rapper.status})}"/>
                </div>
            </a>
        </div>

        <!-- Vide -->
        <div th:if="${#lists.isEmpty(rappers)}" class="text-center py-20">
            <svg class="w-10 h-10 text-zinc-700 mx-auto mb-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
                <path stroke-linecap="round" stroke-linejoin="round" d="M15.182 16.318A4.486 4.486 0 0012.016 15a4.486 4.486 0 00-3.198 1.318M21 12a9 9 0 11-18 0 9 9 0 0118 0zM9.75 9.75c0 .414-.168.75-.375.75S9 10.164 9 9.75 9.168 9 9.375 9s.375.336.375.75zm-.375 0h.008v.015h-.008V9.75zm5.625 0c0 .414-.168.75-.375.75s-.375-.336-.375-.75.168-.75.375-.75.375.336.375.75zm-.375 0h.008v.015h-.008V9.75z"/>
            </svg>
            <p class="text-zinc-500 text-sm mb-4">Aucun rappeur trouvé.</p>
            <a th:if="${query != null}"
               th:href="@{/rappers/suggest(name=${query})}"
               class="text-sm text-zinc-600 hover:text-white transition-colors underline underline-offset-2">
                Soumettre une affaire pour "<span th:text="${query}"></span>"
            </a>
        </div>

        <!-- Pagination -->
        <div th:replace="~{fragments :: pagination('/rappers', ${currentPage}, ${totalPages}, ${filterParams})}"></div>

    </div>
</main>

<footer th:replace="~{layout :: footer}"></footer>

</body>
</html>
