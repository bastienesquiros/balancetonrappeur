<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout :: head('Timeline', null, null, null, null)}"></head>
<body class="bg-zinc-950 text-zinc-100 min-h-screen flex flex-col antialiased">

<header th:replace="~{layout :: nav}"></header>

<main class="flex-1">
    <div class="max-w-3xl mx-auto px-4 py-10">

        <!-- Header -->
        <div class="mb-10">
            <h1 class="text-2xl font-bold text-white mb-1">Timeline</h1>
            <p class="text-zinc-500 text-sm">Chronologie des affaires documentées, de la plus récente à la plus ancienne.</p>
        </div>

        <!-- Vide -->
        <div th:if="${byYear.isEmpty()}" class="text-center py-20">
            <svg class="w-10 h-10 text-zinc-700 mx-auto mb-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
                <path stroke-linecap="round" stroke-linejoin="round" d="M6.75 3v2.25M17.25 3v2.25M3 18.75V7.5a2.25 2.25 0 012.25-2.25h13.5A2.25 2.25 0 0121 7.5v11.25m-18 0A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75m-18 0v-7.5A2.25 2.25 0 015.25 9h13.5A2.25 2.25 0 0121 11.25v7.5"/>
            </svg>
            <p class="text-zinc-500 text-sm">Aucune affaire avec une date connue pour l'instant.</p>
        </div>

        <!-- Années -->
        <div th:each="yearEntry : ${byYear}" class="mb-12">

            <!-- Ancre année -->
            <div class="flex items-center gap-4 mb-6" th:id="${yearEntry.key}">
                <span class="text-3xl font-extrabold text-white" th:text="${yearEntry.key}">2024</span>
                <div class="flex-1 h-px bg-zinc-800"></div>
                <span class="text-zinc-600 text-xs"
                      th:text="${#lists.size(yearEntry.value)} + ' affaire' + (${#lists.size(yearEntry.value)} > 1 ? 's' : '')">
                </span>
            </div>

            <!-- Affaires de l'année -->
            <div class="space-y-3 pl-2 border-l-2 border-zinc-800 ml-4">
                <a th:each="accusation : ${yearEntry.value}"
                   th:href="@{/accusations/{id}(id=${accusation.id})}"
                   class="group block ml-4 relative">

                    <!-- Dot sur la timeline -->
                    <span class="absolute -left-[1.35rem] top-3 w-2.5 h-2.5 rounded-full border-2 border-zinc-950 flex-shrink-0"
                          th:classappend="${accusation.category.color() == 'red'} ? 'bg-red-500' :
                                         (${accusation.category.color() == 'orange'} ? 'bg-orange-500' :
                                         (${accusation.category.color() == 'purple'} ? 'bg-purple-500' : 'bg-yellow-500'))">
                    </span>

                    <div class="bg-zinc-900 border border-zinc-800 rounded-xl px-4 py-3
                                group-hover:border-zinc-600 transition-colors">
                        <div class="flex items-start justify-between gap-3">
                            <div class="min-w-0">
                                <!-- Rappeur -->
                                <p class="text-zinc-500 text-xs mb-1" th:text="${accusation.rapper.name}">Rappeur</p>
                                <!-- Titre -->
                                <p class="text-white text-sm font-medium leading-snug group-hover:text-zinc-300 transition-colors"
                                   th:text="${accusation.title}">Titre</p>
                            </div>
                            <!-- Badges -->
                            <div class="flex flex-col items-end gap-1.5 flex-shrink-0">
                                <th:block th:replace="~{fragments :: categoryBadge(${accusation.category}, false)}"/>
                                <th:block th:replace="~{fragments :: statusBadge(${accusation.status}, false)}"/>
                            </div>
                        </div>
                        <!-- Date précise si dispo -->
                        <p th:if="${accusation.factDate != null}"
                           class="text-zinc-600 text-xs mt-2"
                           th:text="${#temporals.format(accusation.factDate, 'MMMM yyyy')}">janvier 2024</p>
                    </div>
                </a>
            </div>
        </div>

    </div>
</main>

<footer th:replace="~{layout :: footer}"></footer>

</body>
</html>
