<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout :: head('Analyse en cours...', null, null, null, null)}">
</head>
<body class="bg-zinc-950 text-zinc-100 min-h-screen flex flex-col antialiased">

<main class="flex-1 flex items-center justify-center">
    <div class="max-w-sm mx-auto px-4 text-center space-y-8">

        <!-- Icône animée -->
        <div class="relative inline-flex items-center justify-center">
            <!-- Cercle tournant -->
            <svg class="w-24 h-24 animate-spin text-zinc-700" viewBox="0 0 100 100" fill="none">
                <circle cx="50" cy="50" r="42" stroke="currentColor" stroke-width="6" stroke-dasharray="60 200"/>
            </svg>
            <!-- Icône centrale fixe -->
            <span class="absolute text-4xl">🎧</span>
        </div>

        <!-- Texte -->
        <div class="space-y-2">
            <h1 class="text-xl font-bold text-white">Analyse en cours…</h1>
            <p class="text-zinc-500 text-sm" id="status-text">
                On analyse ta bibliothèque Spotify.
            </p>
        </div>

        <!-- Steps animés -->
        <div class="text-left space-y-3" id="steps">
            <div class="flex items-center gap-3 text-sm text-zinc-600" id="step-1">
                <span class="w-5 h-5 rounded-full border border-zinc-700 flex items-center justify-center flex-shrink-0 text-xs">1</span>
                <span>Récupération des sons likés</span>
            </div>
            <div class="flex items-center gap-3 text-sm text-zinc-600" id="step-2">
                <span class="w-5 h-5 rounded-full border border-zinc-700 flex items-center justify-center flex-shrink-0 text-xs">2</span>
                <span>Analyse des playlists</span>
            </div>
            <div class="flex items-center gap-3 text-sm text-zinc-600" id="step-3">
                <span class="w-5 h-5 rounded-full border border-zinc-700 flex items-center justify-center flex-shrink-0 text-xs">3</span>
                <span>Croisement avec notre base</span>
            </div>
        </div>

    </div>
</main>

<script>
    const stepIds = ['step-1', 'step-2', 'step-3'];
    const labels = [
        'Récupération des sons likés…',
        'Analyse des playlists…',
        'Croisement avec notre base…'
    ];

    function activateStep(index) {
        const el = document.getElementById(stepIds[index]);
        el.classList.remove('text-zinc-600');
        el.classList.add('text-white');
        el.querySelector('span').classList.remove('border-zinc-700');
        el.querySelector('span').classList.add('border-green-500', 'text-green-400');
        document.getElementById('status-text').textContent = labels[index];
    }

    activateStep(0);
    setTimeout(() => activateStep(1), 1200);
    setTimeout(() => activateStep(2), 2400);
    setTimeout(() => { window.location.href = '/scan/result'; }, 500);
    // Redirige vers le résultat — le navigateur attend la réponse serveur (scan en cours)
    setTimeout(() => {
        window.location.href = '/scan/result';
    }, 500);
</script>

</body>
</html>
