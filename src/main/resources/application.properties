spring.application.name=balance_ton_rappeur

# DataSource
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false

# Mail
spring.mail.host=${MAIL_HOST}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
btr.mail.from=${BTR_MAIL_FROM}
btr.mail.noreply=${BTR_MAIL_NOREPLY:${BTR_MAIL_FROM}}
btr.mail.digest-to=${BTR_MAIL_DIGEST_TO}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Admin dashboard
btr.admin.password=${BTR_ADMIN_PASSWORD:}

# Spotify
spotify.client-id=${SPOTIFY_CLIENT_ID:}
spotify.client-secret=${SPOTIFY_CLIENT_SECRET:}
spotify.redirect-uri=${SPOTIFY_REDIRECT_URI:}
