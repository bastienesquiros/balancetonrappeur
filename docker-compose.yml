services:
  traefik:
    image: traefik:latest
    container_name: btr_traefik
    restart: unless-stopped
    command:
      - "--api.insecure=false"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--certificatesresolvers.btrresolver.acme.tlschallenge=true"
      - "--certificatesresolvers.btrresolver.acme.email=udshoft@gmail.com"
      - "--certificatesresolvers.btrresolver.acme.storage=/letsencrypt/acme.json"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
      - "./letsencrypt:/letsencrypt"
    networks:
      - proxy

  app:
    build: .
    container_name: btr_app
    restart: unless-stopped
    environment:
      DB_URL: jdbc:postgresql://db:5432/balancetonrappeur
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      MAIL_HOST: ${MAIL_HOST}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USERNAME: ${MAIL_USERNAME}
      MAIL_PASSWORD: ${MAIL_PASSWORD}
      BTR_MAIL_FROM: ${BTR_MAIL_FROM}
      BTR_MAIL_DIGEST_TO: ${BTR_MAIL_DIGEST_TO}
      BTR_ADMIN_PASSWORD: ${BTR_ADMIN_PASSWORD}
      SPOTIFY_CLIENT_ID: ${SPOTIFY_CLIENT_ID:-}
      SPOTIFY_CLIENT_SECRET: ${SPOTIFY_CLIENT_SECRET:-}
      SPOTIFY_REDIRECT_URI: ${SPOTIFY_REDIRECT_URI:-}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - internal
      - proxy
    labels:
      - traefik.enable=true
      - traefik.http.routers.btr-app.rule=Host(`balancetonrappeur.fr`,`www.balancetonrappeur.fr`)
      - traefik.http.routers.btr-app.entrypoints=websecure
      - traefik.http.routers.btr-app.tls.certresolver=btrresolver
      - traefik.http.services.btr-app.loadbalancer.server.port=8080
      - traefik.http.routers.btr-app-http.rule=Host(`balancetonrappeur.fr`)
      - traefik.http.routers.btr-app-http.entrypoints=web
      - traefik.http.routers.btr-app-http.middlewares=https-redirect
      - traefik.http.middlewares.https-redirect.redirectscheme.scheme=https

  db:
    image: postgres:16-alpine
    container_name: btr_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: balancetonrappeur
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - btr_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d balancetonrappeur" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

volumes:
  btr_pgdata:

networks:
  internal:
    name: btr_internal
    internal: true
  proxy:
    name: btr_proxy
    driver: bridge